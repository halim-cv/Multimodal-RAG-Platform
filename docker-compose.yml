version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Main FastAPI backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Persist session data (embeddings, extracted text)
      - ./Text-encoding/sessions:/app/Text-encoding/sessions
      # Persist HuggingFace model downloads across container rebuilds
      - ./model_cache:/root/.cache/huggingface
      # Mount eval reports as output
      - ./eval/reports:/app/eval/reports
    depends_on:
      - mlflow
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # MLflow tracking server
  # ─────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri /mlruns
        --default-artifact-root /mlruns
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped
